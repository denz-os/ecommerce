version: "3.9"

services:

  # ─── MongoDB ───────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: linkup_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: linkup
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - linkup_net

  # ─── Mongo Express (visual DB browser) ────────────────────
  mongo-express:
    image: mongo-express:latest
    container_name: linkup_mongo_express
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASS}
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    ports:
      - "8081:8081"
    networks:
      - linkup_net

  # ─── FastAPI Backend ───────────────────────────────────────
  api:
    build: .
    container_name: linkup_api
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app           # live-reload: code changes reflect instantly
    networks:
      - linkup_net

volumes:
  mongo_data:

networks:
  linkup_net:
    driver: bridge